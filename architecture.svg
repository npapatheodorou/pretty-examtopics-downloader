<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 800" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-green" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-blue-start" markerWidth="9" markerHeight="9" refX="0.5" refY="3" orient="auto">
      <path d="M7,0 L7,6 L0,3 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.6" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="960" height="800" fill="#f8fafc"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">ExamTopics Downloader — Architecture</text>

  <!-- Left rail divider -->
  <line x1="64" y1="48" x2="64" y2="722" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Stage rail labels (rotated) -->
  <text x="34" y="80"  transform="rotate(-90 34 80)"  text-anchor="middle" font-size="10" font-weight="700" letter-spacing="1.5" fill="#94a3b8">CLI</text>
  <text x="34" y="199" transform="rotate(-90 34 199)" text-anchor="middle" font-size="10" font-weight="700" letter-spacing="1.5" fill="#94a3b8">DISCOVERY</text>
  <text x="34" y="328" transform="rotate(-90 34 328)" text-anchor="middle" font-size="10" font-weight="700" letter-spacing="1.5" fill="#94a3b8">EXTRACTION</text>
  <text x="34" y="450" transform="rotate(-90 34 450)" text-anchor="middle" font-size="10" font-weight="700" letter-spacing="1.5" fill="#94a3b8">PARSING</text>
  <text x="34" y="561" transform="rotate(-90 34 561)" text-anchor="middle" font-size="10" font-weight="700" letter-spacing="1.5" fill="#94a3b8">MODEL</text>
  <text x="34" y="679" transform="rotate(-90 34 679)" text-anchor="middle" font-size="10" font-weight="700" letter-spacing="1.5" fill="#94a3b8">OUTPUT</text>

  <!-- ════════════ CONNECTORS (drawn first, behind boxes) ════════════ -->
  <g fill="none" stroke="#94a3b8" stroke-width="1.5">
    <!-- CLI → discovery fan -->
    <path d="M468,110 V140"/>
    <path d="M188,140 H748"/>
    <path d="M188,140 V160" marker-end="url(#arrow)"/>
    <path d="M468,140 V160" marker-end="url(#arrow)"/>
    <path d="M748,140 V160" marker-end="url(#arrow)"/>

    <!-- Exam Slugs → extraction fan -->
    <path d="M468,238 V270"/>
    <path d="M160,270 H775"/>
    <path d="M160,270 V290" marker-end="url(#arrow)"/>
    <path d="M365,270 V290" marker-end="url(#arrow)"/>
    <path d="M570,270 V290" marker-end="url(#arrow)"/>
    <path d="M775,270 V290" marker-end="url(#arrow)"/>

    <!-- Parallel scrape → parsing fan -->
    <path d="M570,366 V390"/>
    <path d="M160,390 H775"/>
    <path d="M160,390 V412" marker-end="url(#arrow)"/>
    <path d="M365,390 V412" marker-end="url(#arrow)"/>
    <path d="M570,390 V412" marker-end="url(#arrow)"/>
    <path d="M775,390 V412" marker-end="url(#arrow)"/>

    <!-- Parsing → model merge -->
    <path d="M160,488 V510"/>
    <path d="M365,488 V510"/>
    <path d="M570,488 V510"/>
    <path d="M775,488 V510"/>
    <path d="M160,510 H775"/>
    <path d="M468,510 V530" marker-end="url(#arrow)"/>

    <!-- Model → output -->
    <path d="M468,592 V640" marker-end="url(#arrow)"/>
    <path d="M306,678 H350" marker-end="url(#arrow)"/>
  </g>

  <!-- Exam Slugs ↔ Exam Cache (cache read/write) -->
  <path d="M586,199 H630" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-blue)" marker-start="url(#arrow-blue-start)"/>

  <!-- Parallel scrape → network layer (uses) -->
  <path d="M660,328 H685" fill="none" stroke="#b45309" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Output file → browser (verified render path) -->
  <path d="M586,678 H630" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ════════════ STAGE 1: CLI ════════════ -->
  <rect x="328" y="50" width="280" height="60" rx="9" fill="#1e293b" filter="url(#shadow)"/>
  <text x="468" y="74" text-anchor="middle" font-size="13" font-weight="600" fill="#f1f5f9">cmd/main.go</text>
  <text x="468" y="92" text-anchor="middle" font-size="10.5" fill="#94a3b8">Interactive CLI · stdin / stdout</text>
  <text x="468" y="106" text-anchor="middle" font-size="10" fill="#64748b">provider → exam → extract</text>

  <!-- ════════════ STAGE 2: DISCOVERY ════════════ -->
  <!-- Providers -->
  <rect x="70" y="160" width="236" height="78" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="188" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">GetAllProviders()</text>
  <line x1="90" y1="194" x2="286" y2="194" stroke="#f1f5f9" stroke-width="1"/>
  <text x="188" y="212" text-anchor="middle" font-size="10" fill="#475569">scrape /exams/ index</text>
  <text x="188" y="228" text-anchor="middle" font-size="10" fill="#475569">+ /discussions/ fallback</text>

  <!-- Exam Slugs -->
  <rect x="350" y="160" width="236" height="78" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="468" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">GetProviderExamSlugs()</text>
  <line x1="370" y1="194" x2="566" y2="194" stroke="#f1f5f9" stroke-width="1"/>
  <text x="468" y="212" text-anchor="middle" font-size="10" fill="#475569">official exam list</text>
  <text x="468" y="228" text-anchor="middle" font-size="10" fill="#475569">+ discussion URLs (optional)</text>

  <!-- Exam Cache -->
  <rect x="630" y="160" width="236" height="78" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="748" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">exam_cache.go</text>
  <line x1="650" y1="194" x2="846" y2="194" stroke="#eff6ff" stroke-width="1"/>
  <text x="748" y="212" text-anchor="middle" font-size="10" fill="#3b82f6">24h disk cache · exam slugs</text>
  <text x="748" y="228" text-anchor="middle" font-size="10" fill="#3b82f6">UserCacheDir()/examtopics…</text>

  <!-- ════════════ STAGE 3: EXTRACTION (GetAllPages) ════════════ -->
  <!-- (1) Discover links -->
  <rect x="70" y="290" width="180" height="76" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">① Discover links</text>
  <text x="160" y="332" text-anchor="middle" font-size="9.5" fill="#6b7280">/discussions/{p}/?page=N</text>
  <text x="160" y="348" text-anchor="middle" font-size="9.5" fill="#6b7280">paginated · dedupe · sort</text>

  <!-- (2) View solutions -->
  <rect x="275" y="290" width="180" height="76" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="365" y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">② FetchViewSolutions()</text>
  <text x="365" y="332" text-anchor="middle" font-size="9.5" fill="#16a34a">/exams/{p}/{e}/view/</text>
  <text x="365" y="348" text-anchor="middle" font-size="9.5" fill="#16a34a">free official answers (~5)</text>

  <!-- (3) Parallel scrape -->
  <rect x="480" y="290" width="180" height="76" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="570" y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">③ Parallel Scrape</text>
  <text x="570" y="332" text-anchor="middle" font-size="9.5" fill="#6b7280">goroutines · adaptive AIMD</text>
  <text x="570" y="348" text-anchor="middle" font-size="9.5" fill="#6b7280">cache-aware · retry pass</text>

  <!-- (4) Network layer -->
  <rect x="685" y="290" width="180" height="76" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="775" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">FetchURL()  ·  net</text>
  <text x="775" y="328" text-anchor="middle" font-size="9.5" fill="#b45309">backoff + Retry-After</text>
  <text x="775" y="343" text-anchor="middle" font-size="9.5" fill="#b45309">AIMD feedback 200&#8593;/429&#8595;</text>
  <text x="775" y="358" text-anchor="middle" font-size="9.5" fill="#1d4ed8">page_cache.go · 24h TTL</text>

  <!-- ════════════ STAGE 4: PER-QUESTION PARSING (getDataFromLink) ════════════ -->
  <rect x="70" y="412" width="180" height="76" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="434" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Question text</text>
  <text x="160" y="454" text-anchor="middle" font-size="9.5" fill="#6b7280">.question-body</text>
  <text x="160" y="470" text-anchor="middle" font-size="9.5" fill="#6b7280">exhibit image URLs</text>

  <rect x="275" y="412" width="180" height="76" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="365" y="434" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Answer options</text>
  <text x="365" y="454" text-anchor="middle" font-size="9.5" fill="#6b7280">.multi-choice-item A–F</text>
  <text x="365" y="470" text-anchor="middle" font-size="9.5" fill="#6b7280">correct-hidden attr</text>

  <rect x="480" y="412" width="180" height="76" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="570" y="434" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Solution merge</text>
  <text x="570" y="454" text-anchor="middle" font-size="9.5" fill="#16a34a">official → hidden</text>
  <text x="570" y="470" text-anchor="middle" font-size="9.5" fill="#16a34a">→ exhibit (trust order)</text>

  <rect x="685" y="412" width="180" height="76" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="775" y="434" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Comments</text>
  <text x="775" y="454" text-anchor="middle" font-size="9.5" fill="#6b7280">.comment-content</text>
  <text x="775" y="470" text-anchor="middle" font-size="9.5" fill="#6b7280">user · answer · text</text>

  <!-- ════════════ STAGE 5: DATA MODEL ════════════ -->
  <rect x="258" y="530" width="420" height="62" rx="9" fill="#1e293b" filter="url(#shadow)"/>
  <text x="468" y="554" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f1f5f9">models.QuestionData</text>
  <text x="468" y="574" text-anchor="middle" font-size="9.5" fill="#94a3b8">Title · Content · ExhibitURLs · Questions[] · Answer · Solution* · Comments[]</text>

  <!-- ════════════ STAGE 6: OUTPUT (WriteDataWithSelection) ════════════ -->
  <rect x="70" y="640" width="236" height="78" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="188" y="666" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">templates/template.html</text>
  <line x1="90" y1="676" x2="286" y2="676" stroke="#f1f5f9" stroke-width="1"/>
  <text x="188" y="694" text-anchor="middle" font-size="10" fill="#6b7280">go:embed · baked into binary</text>
  <text x="188" y="710" text-anchor="middle" font-size="10" fill="#6b7280">CSS + JS + card renderer</text>

  <rect x="350" y="640" width="236" height="78" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="468" y="666" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">{provider}_{exam}.html</text>
  <line x1="370" y1="676" x2="566" y2="676" stroke="#f0fdf4" stroke-width="1"/>
  <text x="468" y="694" text-anchor="middle" font-size="10" fill="#16a34a">questions JSON injected</text>
  <text x="468" y="710" text-anchor="middle" font-size="10" fill="#16a34a">single self-contained file</text>

  <rect x="630" y="640" width="236" height="78" rx="8" fill="#0f172a" filter="url(#shadow)"/>
  <text x="748" y="666" text-anchor="middle" font-size="12" font-weight="600" fill="#f1f5f9">Browser</text>
  <line x1="650" y1="676" x2="846" y2="676" stroke="#1e293b" stroke-width="1"/>
  <text x="748" y="694" text-anchor="middle" font-size="10" fill="#94a3b8">clickable cards · reveal solution</text>
  <text x="748" y="710" text-anchor="middle" font-size="10" fill="#64748b">green = verified · orange = unverified</text>

  <!-- ════════════ LEGEND ════════════ -->
  <rect x="64" y="744" width="802" height="34" rx="7" fill="#f1f5f9"/>
  <line x1="88" y1="761" x2="112" y2="761" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="120" y="765" font-size="10" fill="#475569">data / control flow</text>

  <line x1="248" y1="761" x2="272" y2="761" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>
  <text x="280" y="765" font-size="10" fill="#475569">cache read / write</text>

  <line x1="404" y1="761" x2="428" y2="761" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="436" y="765" font-size="10" fill="#475569">verified-answer path</text>

  <rect x="566" y="754" width="13" height="13" rx="2.5" fill="#1e293b"/>
  <text x="585" y="765" font-size="10" fill="#475569">entry point</text>

  <rect x="666" y="754" width="13" height="13" rx="2.5" fill="#fffbeb" stroke="#fde68a" stroke-width="1.4"/>
  <text x="685" y="765" font-size="10" fill="#475569">network</text>

  <rect x="748" y="754" width="13" height="13" rx="2.5" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="767" y="765" font-size="10" fill="#475569">official answer</text>
</svg>
