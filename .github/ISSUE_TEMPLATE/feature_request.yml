name: Feature request
description: Suggest a new feature or an improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the suggestion! Please describe the problem first, then the idea.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched [existing issues](../issues?q=is%3Aissue) and didn't find a duplicate.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do today, and where does the tool fall short?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature. If it's a CLI option, suggest a flag name and behavior (e.g. `--recent-comments-days N`).
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Affected provider/exam, examples, mockups, or anything else.
    validations:
      required: false
